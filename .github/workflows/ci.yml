name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Run shell test suite
        run: |
          set -euo pipefail
          for f in tests/*_test.sh; do
            bash "$f"
          done
      - name: Run shellcheck
        run: |
          set -euo pipefail
          shellcheck bin/ingo lib/*.sh tests/*.sh
